name: tests

on:
  push:
    branches: [main, feature/**, bugfix/**, hotfix/**]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pytest-xdist black flake8 mypy
      - name: Black check
        run: python -m black --check vehicle_dynamics validation optimization tests/integration tests/performance tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py
      - name: Flake8 check
        run: python -m flake8 vehicle_dynamics validation optimization tests/integration tests/performance tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py --max-line-length=88 --extend-ignore=E203,W503,E501
      - name: Mypy check
        run: python -m mypy vehicle_dynamics validation optimization tests/integration tests/performance --ignore-missing-imports --disable-error-code attr-defined --disable-error-code no-any-return --disable-error-code untyped-decorator --disable-error-code assignment --disable-error-code unused-ignore --disable-error-code type-arg
      - name: Unit tests
        run: python -m pytest tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py -m "unit" -q
      - name: Integration tests
        run: python -m pytest tests/integration tests/performance -m "integration" -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
