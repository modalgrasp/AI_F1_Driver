name: linting

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
      - name: Check formatting
        run: |
          python -m black --check vehicle_dynamics validation optimization tests/integration tests/performance tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py
          python -m isort --check-only vehicle_dynamics validation optimization tests/integration tests/performance tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py
      - name: Lint and type checks
        run: |
          python -m flake8 vehicle_dynamics validation optimization tests/integration tests/performance tests/test_tire_model.py tests/test_aerodynamics.py tests/test_powertrain.py tests/test_vehicle_dynamics.py tests/test_validation.py --max-line-length=88 --extend-ignore=E203,W503,E501
          python -m mypy vehicle_dynamics validation optimization tests/integration tests/performance --ignore-missing-imports --disable-error-code attr-defined --disable-error-code no-any-return --disable-error-code untyped-decorator --disable-error-code assignment --disable-error-code unused-ignore
