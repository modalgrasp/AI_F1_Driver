repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=102400"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length=88"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--multi-line", "3", "--line-length", "88"]

  # NOTE: flake8/mypy hooks are intentionally disabled for Phase 1 bootstrap
  # because repository placeholders and CLI scripts are not yet lint-clean.
  # Re-enable in Phase 2 once code quality baseline is stabilized.
